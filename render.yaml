services:
  - type: web
    name: patience-health-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false  # set manually in Render dashboard
      - key: SECRET_KEY
        sync: false  # set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false  # set manually in Render dashboard
